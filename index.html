<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>靈感收集器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; min-height: 100dvh; box-shadow: 0 0 40px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .view-section { display: none; flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #3b82f6; }
        .category-tabs { display: flex; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 10px; margin-bottom: 10px; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex-shrink: 0; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; color: #64748b; background: #f1f5f9; margin-right: 8px; transition: all 0.2s; }
        .tab-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        .preview-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; }
        .preview-scroll img { height: 80px; width: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; flex-shrink: 0; }
        
        /* 網格預覽樣式 */
        .grid-library { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .idea-card { background: white; border: 1px solid #f1f5f9; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: transform 0.2s; cursor: pointer; display: flex; flex-direction: column; }
        .idea-card:active { transform: scale(0.97); }
        .idea-card-img { width: 100%; height: 120px; object-fit: cover; background: #f8fafc; }
        .idea-card-content { padding: 12px; flex: 1; display: flex; flex-direction: column; }
        .idea-card-text { font-size: 13px; color: #334155; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; margin-bottom: 8px; }
        .idea-card-meta { font-size: 10px; color: #94a3b8; margin-top: auto; display: flex; justify-content: space-between; align-items: center; }
        
        /* 彈窗樣式 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: none; justify-content: center; align-items: flex-end; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; max-width: 480px; max-height: 90vh; border-radius: 24px 24px 0 0; display: flex; flex-direction: column; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 selection:bg-blue-100">

    <div class="app-container pt-safe">
        <!-- 頂部 Header -->
        <header class="flex justify-between items-center px-6 py-4 bg-white/80 backdrop-blur-md sticky top-0 z-10 border-b border-gray-50">
            <div class="flex items-center space-x-2">
                <i id="headerIcon" class="ph ph-sparkle text-2xl text-blue-500"></i>
                <h1 id="headerTitle" class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">新增靈感</h1>
            </div>
            <button id="refreshBtn" class="p-2 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors hidden">
                <i class="ph ph-arrows-clockwise text-xl"></i>
            </button>
        </header>

        <!-- 主要內容區 -->
        <main class="flex-1 relative">
            
            <!-- ================= VIEW: 新增/編輯 (Add/Edit) ================= -->
            <section id="view-add" class="view-section active px-6 py-4 space-y-5">
                <!-- 編輯模式提示 -->
                <div id="editModeAlert" class="hidden bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-xl flex items-center justify-between">
                    <div class="flex items-center text-sm font-medium"><i class="ph ph-pencil-simple text-lg mr-2"></i>正在編輯靈感</div>
                    <button id="cancelEditBtn" class="text-xs text-yellow-600 underline">取消</button>
                </div>

                <!-- 1. 分類選擇 -->
                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-2">分類</label>
                    <div class="relative">
                        <select id="category" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium"></select>
                        <i class="ph ph-caret-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <!-- 2. 內容輸入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-2">內容描述或筆記</label>
                    <textarea id="content" rows="4" placeholder="記錄下突然想到的點子..." class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>

                <!-- 3. 網址輸入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-2">來源連結 (選填)</label>
                    <div class="flex items-center bg-gray-50 border border-gray-200 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-blue-500">
                        <div class="pl-4 pr-2 text-gray-400"><i class="ph ph-link text-lg"></i></div>
                        <input type="url" id="url" placeholder="https://" class="w-full bg-transparent text-gray-900 py-3 pr-4 focus:outline-none text-sm">
                    </div>
                </div>

                <!-- 4. 圖片上傳區塊 -->
                <div id="imageUploadSection">
                    <label class="block text-sm font-medium text-gray-500 mb-2">上傳截圖 (多張/選填)</label>
                    <input type="file" id="imageInput" accept="image/*" multiple class="hidden">
                    <button type="button" onclick="document.getElementById('imageInput').click()" class="w-full border-2 border-dashed border-gray-300 rounded-xl py-6 flex flex-col items-center justify-center text-gray-500 hover:bg-blue-50 hover:border-blue-400 transition-all cursor-pointer bg-white">
                        <i class="ph ph-image text-3xl mb-2 text-gray-400"></i>
                        <span class="text-sm">點擊上傳截圖 (自動壓縮)</span>
                    </button>
                    <div id="previewContainer" class="preview-scroll mt-4 hidden"></div>
                    
                    <!-- AI 分析按鈕 -->
                    <button id="aiAnalyzeBtn" type="button" class="hidden w-full mt-3 bg-purple-50 text-purple-600 border border-purple-200 rounded-xl py-3 flex items-center justify-center space-x-2 text-sm font-medium hover:bg-purple-100 transition-all active:scale-95">
                        <i class="ph ph-magic-wand text-lg"></i>
                        <span>AI 提取文字與摘要</span>
                    </button>
                    <p id="aiMsg" class="text-center text-xs font-medium mt-2 hidden"></p>
                </div>

                <!-- 送出按鈕 -->
                <button id="submitBtn" class="w-full bg-blue-600 text-white font-semibold rounded-xl py-4 mt-4 flex items-center justify-center space-x-2 active:scale-95 transition-all shadow-lg shadow-blue-200">
                    <i class="ph ph-paper-plane-tilt text-xl"></i>
                    <span id="submitBtnText">儲存至靈感庫</span>
                </button>
                <p id="statusMsg" class="text-center text-sm font-medium mt-3 hidden"></p>
            </section>

            <!-- ================= VIEW: 靈感庫 (Library) ================= -->
            <section id="view-library" class="view-section px-4 py-2">
                <!-- 動態生成的分類 Tab -->
                <div class="category-tabs" id="libraryTabs"></div>

                <!-- 載入中動畫 -->
                <div id="libraryLoading" class="hidden flex-col items-center justify-center py-20 text-blue-500">
                    <i class="ph ph-spinner animate-spin text-4xl mb-4"></i>
                    <p class="text-sm font-medium text-gray-500">同步資料中...</p>
                </div>

                <!-- 網格預覽容器 -->
                <div id="libraryContainer" class="grid-library pb-10"></div>
            </section>

            <!-- ================= VIEW: 搜尋 (Search) ================= -->
            <section id="view-search" class="view-section px-6 py-4">
                <div class="relative mb-6">
                    <i class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="text" id="searchInput" placeholder="搜尋內容、分類..." class="w-full bg-gray-100 text-gray-900 rounded-full pl-12 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <div id="searchContainer" class="grid-library pb-10">
                    <div class="text-center py-20 text-gray-400 col-span-2">
                        <i class="ph ph-magnifying-glass text-4xl mb-4 opacity-50 block mx-auto"></i>
                        <p>輸入關鍵字開始搜尋</p>
                    </div>
                </div>
            </section>

            <!-- ================= VIEW: 設定 (Settings) ================= -->
            <section id="view-settings" class="view-section px-6 py-6 space-y-6">
                <!-- 分類管理區塊 -->
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-6">
                    <h3 class="text-sm font-bold text-gray-800 mb-3 flex items-center"><i class="ph ph-folder-plus text-lg mr-2 text-blue-500"></i>分類管理</h3>
                    <div class="flex space-x-2">
                        <input type="text" id="newCategoryInput" placeholder="例如：✈️ 旅遊規劃" class="flex-1 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <button id="addCategoryBtn" class="bg-blue-50 text-blue-600 border border-blue-200 px-4 py-2 rounded-xl font-medium text-sm hover:bg-blue-100 transition-colors shrink-0">新增</button>
                    </div>
                    <p id="categoryMsg" class="text-xs font-medium mt-2 hidden"></p>
                    <p class="text-[11px] text-gray-400 mt-2 leading-relaxed">新增的分類會自動同步到 Google Sheet 的「分類設定」分頁中。</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-2">Gemini API Key</label>
                    <div class="relative shadow-sm rounded-xl mb-2">
                        <i class="ph ph-key absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input type="password" id="geminiApiKey" placeholder="輸入您的 Gemini API Key..." class="w-full bg-white border border-gray-200 text-gray-900 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-base">
                    </div>
                    <p class="text-xs text-gray-500 leading-relaxed">取得您的免費 API Key，請前往 <a href="https://aistudio.google.com/" target="_blank" class="text-blue-500 underline">Google AI Studio</a>。金鑰僅儲存於您的設備本地 (localStorage)。</p>
                </div>
                <button id="saveSettingsBtn" class="w-full bg-gray-800 text-white font-semibold rounded-xl py-4 flex items-center justify-center space-x-2 active:scale-95 transition-all shadow-lg">
                    <i class="ph ph-floppy-disk text-xl"></i>
                    <span>儲存設定</span>
                </button>
                <p id="settingsMsg" class="text-center text-sm font-medium mt-2 hidden"></p>
            </section>
        </main>

        <!-- 底部導覽列 -->
        <nav class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-100 flex justify-around items-center pb-safe pt-2 px-2 z-20 shrink-0" style="padding-bottom: max(env(safe-area-inset-bottom), 12px);">
            <div class="nav-item active flex flex-col items-center p-2 text-gray-400 cursor-pointer" onclick="switchView('add', this)">
                <i class="ph ph-plus-circle text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">新增</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2 text-gray-400 cursor-pointer" onclick="switchView('library', this)">
                <i class="ph ph-cards text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">靈感庫</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2 text-gray-400 cursor-pointer" onclick="switchView('search', this)">
                <i class="ph ph-magnifying-glass text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">搜尋</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2 text-gray-400 cursor-pointer" onclick="switchView('settings', this)">
                <i class="ph ph-gear text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">設定</span>
            </div>
        </nav>
    </div>

    <!-- 詳細內容彈窗 (Modal) -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content pb-safe">
            <!-- Modal Header -->
            <div class="flex justify-between items-center px-6 py-4 border-b border-gray-100">
                <div class="flex items-center space-x-2">
                    <span id="modalCategory" class="text-xs font-bold px-3 py-1 bg-blue-50 text-blue-600 rounded-full"></span>
                    <span id="modalDate" class="text-xs text-gray-400"></span>
                </div>
                <button onclick="closeModal()" class="p-2 rounded-full hover:bg-gray-100 text-gray-500">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <!-- Modal Body -->
            <div class="overflow-y-auto p-6 space-y-4" style="max-height: 70vh;">
                <p id="modalContent" class="text-gray-800 whitespace-pre-wrap leading-relaxed text-sm"></p>
                <div id="modalImages" class="space-y-3 mt-4"></div>
                <a id="modalLink" href="#" target="_blank" class="hidden inline-flex items-center text-sm text-blue-600 bg-blue-50 px-4 py-2 rounded-lg mt-2">
                    <i class="ph ph-link-simple text-lg mr-2"></i> 前往來源連結
                </a>
            </div>
            <!-- Modal Footer (Action Buttons) -->
            <div class="px-6 py-4 border-t border-gray-100 flex space-x-3 bg-gray-50 rounded-t-none rounded-b-24">
                <button id="modalEditBtn" class="flex-1 bg-white border border-gray-200 text-gray-700 py-3 rounded-xl font-medium text-sm flex justify-center items-center shadow-sm active:scale-95 transition-all">
                    <i class="ph ph-pencil-simple text-lg mr-2"></i>編輯修改
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ 第 1 步：請將這裡換成你剛才部署 GAS 取得的網址
        // ==========================================
        const GAS_WEB_APP_URL = 'YOUR_GAS_WEB_APP_URL_HERE'; 

        // 全域變數
        let allIdeas = []; 
        let isDataLoaded = false;
        let currentCategory = '全部';
        let dynamicCategories = ['📂 其他'];
        
        // 編輯模式變數
        let editingId = null; // 儲存正在編輯的項目時間戳 (作為唯一ID)

        window.addEventListener('DOMContentLoaded', () => { fetchLibraryData(true); });

        // ==========================================
        // 介面切換邏輯
        // ==========================================
        function switchView(viewName, navElement) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`view-${viewName}`).classList.add('active');
            navElement.classList.add('active');

            const headerTitle = document.getElementById('headerTitle');
            const headerIcon = document.getElementById('headerIcon');
            const refreshBtn = document.getElementById('refreshBtn');

            if (viewName === 'add') {
                headerTitle.innerText = editingId ? '編輯靈感' : '新增靈感';
                headerIcon.className = editingId ? 'ph ph-pencil-simple text-2xl text-yellow-500' : 'ph ph-sparkle text-2xl text-blue-500';
                refreshBtn.style.display = 'none';
            } else if (viewName === 'library') {
                headerTitle.innerText = '靈感庫';
                headerIcon.className = 'ph ph-cards text-2xl text-blue-500';
                refreshBtn.style.display = 'block';
                if (!isDataLoaded) fetchLibraryData();
                else filterLibrary(currentCategory); // 確保每次切換回來都重新渲染
            } else if (viewName === 'search') {
                headerTitle.innerText = '搜尋';
                headerIcon.className = 'ph ph-magnifying-glass text-2xl text-blue-500';
                refreshBtn.style.display = 'none';
                if (!isDataLoaded) fetchLibraryData();
            } else if (viewName === 'settings') {
                headerTitle.innerText = '設定';
                headerIcon.className = 'ph ph-gear text-2xl text-gray-500';
                refreshBtn.style.display = 'none';
                document.getElementById('geminiApiKey').value = localStorage.getItem('geminiApiKey') || '';
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==========================================
        // 新增/編輯 靈感表單邏輯
        // ==========================================
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const submitBtn = document.getElementById('submitBtn');
        const submitBtnText = document.getElementById('submitBtnText');
        const statusMsg = document.getElementById('statusMsg');
        const aiAnalyzeBtn = document.getElementById('aiAnalyzeBtn');
        const editModeAlert = document.getElementById('editModeAlert');
        let base64ImagesArray = [];

        imageInput.addEventListener('change', async function(e) {
            const files = e.target.files;
            if (files.length === 0) return;
            previewContainer.innerHTML = '';
            base64ImagesArray = [];
            previewContainer.classList.remove('hidden');
            aiAnalyzeBtn.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('setup');
                        const MAX_WIDTH = 1000;
                        const MAX_HEIGHT = 1000;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        const ctx2 = canvas.getContext('2d');
                        ctx2.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        base64ImagesArray.push(compressedBase64);
                        
                        const previewImg = document.createElement('img');
                        previewImg.src = compressedBase64;
                        previewContainer.appendChild(previewImg);
                    }
                }
            }
        });

        // 提交按鈕 (新增 或 編輯)
        submitBtn.addEventListener('click', async () => {
            const category = document.getElementById('category').value;
            const content = document.getElementById('content').value.trim();
            const url = document.getElementById('url').value.trim();

            if (!content && !url && base64ImagesArray.length === 0 && !editingId) {
                showMessage('請至少輸入文字、連結或上傳圖片！', 'text-red-500');
                return;
            }

            // 判斷是新增還是更新
            const payload = { 
                action: editingId ? 'updateIdea' : 'addIdea', 
                category, content, url, images: base64ImagesArray 
            };
            if (editingId) payload.id = editingId; // 加入識別 ID

            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i><span>儲存中...</span>';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            statusMsg.classList.add('hidden');

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    // 清空表單 & 退出編輯模式
                    clearForm();
                    showMessage(editingId ? '✅ 靈感更新成功！' : '✅ 靈感儲存成功！', 'text-green-600');
                    exitEditMode();
                    fetchLibraryData(true); // 背景刷新資料庫
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                showMessage('❌ 儲存失敗：' + error.message, 'text-red-500');
            } finally {
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
            }
        });

        function showMessage(msg, colorClass) {
            statusMsg.textContent = msg;
            statusMsg.className = `text-center text-sm font-medium mt-3 ${colorClass}`;
            statusMsg.classList.remove('hidden');
        }

        function clearForm() {
            document.getElementById('content').value = '';
            document.getElementById('url').value = '';
            document.getElementById('imageInput').value = '';
            previewContainer.innerHTML = '';
            previewContainer.classList.add('hidden');
            aiAnalyzeBtn.classList.add('hidden');
            base64ImagesArray = [];
        }

        // ==========================================
        // 進入 / 退出編輯模式
        // ==========================================
        function triggerEdit(index) {
            const idea = allIdeas[index];
            if (!idea) return;

            editingId = idea['時間_ID']; // 隱藏的時間戳ID
            
            // 填入資料
            document.getElementById('category').value = idea['分類'];
            document.getElementById('content').value = idea['內容描述'] || '';
            document.getElementById('url').value = idea['來源連結'] || '';
            
            // UI 狀態切換
            document.getElementById('headerTitle').innerText = '編輯靈感';
            document.getElementById('headerIcon').className = 'ph ph-pencil-simple text-2xl text-yellow-500';
            document.getElementById('submitBtnText').innerText = '儲存修改';
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-yellow-500');
            document.getElementById('submitBtn').classList.replace('shadow-blue-200', 'shadow-yellow-200');
            
            // 隱藏圖片上傳區塊 (V2 簡易編輯暫時不支援編輯舊圖片)
            document.getElementById('imageUploadSection').style.display = 'none';
            editModeAlert.classList.remove('hidden');

            closeModal();
            // 切換到新增/編輯頁面
            const addNavBtn = document.querySelector('.nav-item[onclick*="add"]');
            switchView('add', addNavBtn);
        }

        document.getElementById('cancelEditBtn').addEventListener('click', () => {
            clearForm();
            exitEditMode();
        });

        function exitEditMode() {
            editingId = null;
            document.getElementById('headerTitle').innerText = '新增靈感';
            document.getElementById('headerIcon').className = 'ph ph-sparkle text-2xl text-blue-500';
            document.getElementById('submitBtnText').innerText = '儲存至靈感庫';
            document.getElementById('submitBtn').classList.replace('bg-yellow-500', 'bg-blue-600');
            document.getElementById('submitBtn').classList.replace('shadow-yellow-200', 'shadow-blue-200');
            document.getElementById('imageUploadSection').style.display = 'block';
            editModeAlert.classList.add('hidden');
        }

        // ==========================================
        // Gemini AI 圖片分析邏輯
        // ==========================================
        document.getElementById('aiAnalyzeBtn').addEventListener('click', async () => {
            const apiKey = localStorage.getItem('geminiApiKey');
            const aiMsg = document.getElementById('aiMsg');
            const aiBtn = document.getElementById('aiAnalyzeBtn');
            if (!apiKey) {
                aiMsg.textContent = '⚠️ 請先前往「設定」分頁輸入 Gemini API Key';
                aiMsg.className = 'text-center text-xs font-medium mt-2 text-red-500';
                aiMsg.classList.remove('hidden'); return;
            }

            const originalHtml = aiBtn.innerHTML;
            aiBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i><span>AI 分析中...</span>';
            aiBtn.disabled = true; aiMsg.classList.add('hidden');

            try {
                const parts = [{ text: "請提取圖片中的所有文字，並提供一個簡短重點摘要。請用條理清晰的格式輸出。" }];
                base64ImagesArray.forEach(base64 => {
                    parts.push({ inlineData: { mimeType: "image/jpeg", data: base64.split(',')[1] } });
                });

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ role: "user", parts: parts }] })
                });
                const result = await response.json();
                if (result.error) throw new Error(result.error.message);

                const contentField = document.getElementById('content');
                const prefix = contentField.value.trim() ? contentField.value + '\n\n' : '';
                contentField.value = prefix + '【🤖 AI 摘要】\n' + result.candidates[0].content.parts[0].text;
                contentField.style.height = (contentField.scrollHeight) + 'px';

                aiMsg.textContent = '✨ AI 分析完成！';
                aiMsg.className = 'text-center text-xs font-medium mt-2 text-green-600';
                aiMsg.classList.remove('hidden');
            } catch (error) {
                aiMsg.textContent = '❌ AI 失敗：' + error.message;
                aiMsg.className = 'text-center text-xs font-medium mt-2 text-red-500';
                aiMsg.classList.remove('hidden');
            } finally {
                aiBtn.innerHTML = originalHtml; aiBtn.disabled = false;
            }
        });

        // ==========================================
        // 分類管理與設定
        // ==========================================
        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
            localStorage.setItem('geminiApiKey', document.getElementById('geminiApiKey').value.trim());
            const msgEl = document.getElementById('settingsMsg');
            msgEl.textContent = '✅ 設定已儲存';
            msgEl.className = 'text-center text-sm font-medium mt-2 text-green-600';
            msgEl.classList.remove('hidden');
            setTimeout(() => msgEl.classList.add('hidden'), 3000);
        });

        document.getElementById('addCategoryBtn').addEventListener('click', async () => {
            const inputEl = document.getElementById('newCategoryInput');
            const msgEl = document.getElementById('categoryMsg');
            const btnEl = document.getElementById('addCategoryBtn');
            const newCat = inputEl.value.trim();

            if (!newCat) return;
            if (dynamicCategories.includes(newCat)) {
                msgEl.textContent = '⚠️ 此分類已存在';
                msgEl.className = 'text-xs font-medium mt-2 text-red-500';
                msgEl.classList.remove('hidden'); return;
            }

            const originalText = btnEl.innerHTML;
            btnEl.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i>';
            btnEl.disabled = true;

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'addCategory', category: newCat }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await response.json();
                if (result.status === 'success') {
                    dynamicCategories.push(newCat);
                    updateCategoryUI();
                    inputEl.value = '';
                    msgEl.textContent = '✅ 分類新增成功！';
                    msgEl.className = 'text-xs font-medium mt-2 text-green-600';
                    msgEl.classList.remove('hidden');
                    setTimeout(() => msgEl.classList.add('hidden'), 3000);
                }
            } catch (error) {
                msgEl.textContent = '❌ 新增失敗，請檢查網路';
                msgEl.className = 'text-xs mt-2 text-red-500';
                msgEl.classList.remove('hidden');
            } finally {
                btnEl.innerHTML = originalText; btnEl.disabled = false;
            }
        });

        // ==========================================
        // 載入與渲染資料 (網格預覽與彈窗)
        // ==========================================
        document.getElementById('refreshBtn').addEventListener('click', () => fetchLibraryData(false));

        async function fetchLibraryData(isBackground = false) {
            const container = document.getElementById('libraryContainer');
            const loading = document.getElementById('libraryLoading');
            
            if (!isBackground) { container.innerHTML = ''; loading.style.display = 'flex'; }

            try {
                const response = await fetch(GAS_WEB_APP_URL);
                const result = await response.json();
                
                if (result.ideas && result.categories) {
                    allIdeas = result.ideas;
                    dynamicCategories = result.categories;
                } else { allIdeas = result; }
                
                isDataLoaded = true;
                updateCategoryUI();
                if (!isBackground) filterLibrary(currentCategory);
            } catch (error) {
                if (!isBackground) container.innerHTML = '<div class="col-span-2 text-center text-red-500 py-10">載入失敗，請檢查網路或 GAS 網址。</div>';
            } finally {
                if (!isBackground) loading.style.display = 'none';
            }
        }

        function updateCategoryUI() {
            const selectEl = document.getElementById('category');
            const currentSelected = selectEl.value;
            selectEl.innerHTML = '';
            dynamicCategories.forEach(cat => { selectEl.innerHTML += `<option value="${cat}">${cat}</option>`; });
            if (dynamicCategories.includes(currentSelected)) selectEl.value = currentSelected;

            const tabsEl = document.getElementById('libraryTabs');
            let tabsHtml = `<button class="tab-btn ${currentCategory === '全部' ? 'active' : ''}" onclick="filterLibrary('全部')">全部</button>`;
            dynamicCategories.forEach(cat => {
                const shortName = cat.replace(/^[^a-zA-Z0-9\u4e00-\u9fa5]+/, '').trim() || cat;
                const isActive = currentCategory === cat ? 'active' : '';
                tabsHtml += `<button class="tab-btn ${isActive}" onclick="filterLibrary('${cat}')">${shortName}</button>`;
            });
            tabsEl.innerHTML = tabsHtml;
        }

        function filterLibrary(categoryName) {
            currentCategory = categoryName;
            document.querySelectorAll('#libraryTabs .tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick') === `filterLibrary('${categoryName}')`) {
                    btn.classList.add('active');
                    btn.scrollIntoView({behavior: "smooth", block: "nearest", inline: "center"});
                }
            });
            let filteredData = (categoryName !== '全部') ? allIdeas.filter(idea => idea['分類'] === categoryName) : allIdeas;
            renderCards(filteredData, 'libraryContainer');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const container = document.getElementById('searchContainer');
            if (keyword.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-400 col-span-2"><i class="ph ph-magnifying-glass text-4xl mb-4 opacity-50 block mx-auto"></i><p>輸入關鍵字開始搜尋</p></div>';
                return;
            }
            const filteredData = allIdeas.filter(idea => 
                (idea['分類'] && idea['分類'].toLowerCase().includes(keyword)) ||
                (idea['內容描述'] && idea['內容描述'].toLowerCase().includes(keyword))
            );
            renderCards(filteredData, 'searchContainer');
        });

        // 渲染「預覽網格卡片」
        function renderCards(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-16 text-gray-400"><i class="ph ph-empty text-4xl mb-2 opacity-50 block mx-auto"></i><p>這裡目前沒有靈感哦</p></div>`;
                return;
            }

            data.forEach((idea) => {
                // 找尋對應在全域 allIdeas 中的索引，方便點擊時呼叫
                const globalIndex = allIdeas.findIndex(item => item['時間_ID'] === idea['時間_ID']);
                
                const card = document.createElement('div');
                card.className = 'idea-card';
                card.onclick = () => openModal(globalIndex);

                // 處理縮圖 (只取第一張)
                let imgHtml = '';
                if (idea['圖片連結']) {
                    const firstImg = idea['圖片連結'].split('\n')[0].trim();
                    if (firstImg) imgHtml = `<img src="${firstImg}" class="idea-card-img" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Error'">`;
                } else {
                    // 若無圖片，給一個純色背景或漸層
                    imgHtml = `<div class="idea-card-img bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center"><i class="ph ph-text-aa text-3xl text-blue-200"></i></div>`;
                }

                // 處理文字摘要 (最多3行)
                const contentText = idea['內容描述'] || '無內容描述';
                const shortDate = idea['時間_顯示'] ? idea['時間_顯示'].split(' ')[0] : '';
                const shortCat = idea['分類'].replace(/^[^a-zA-Z0-9\u4e00-\u9fa5]+/, '').trim() || idea['分類'];

                card.innerHTML = `
                    ${imgHtml}
                    <div class="idea-card-content">
                        <div class="idea-card-text">${contentText}</div>
                        <div class="idea-card-meta">
                            <span class="px-2 py-0.5 bg-gray-100 rounded-full text-gray-500">${shortCat}</span>
                            <span>${shortDate}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ==========================================
        // 彈窗 Modal 邏輯
        // ==========================================
        const modal = document.getElementById('detailModal');
        
        function openModal(index) {
            const idea = allIdeas[index];
            if (!idea) return;

            document.getElementById('modalCategory').innerText = idea['分類'];
            document.getElementById('modalDate').innerText = idea['時間_顯示'] || '';
            document.getElementById('modalContent').innerText = idea['內容描述'] || '沒有文字內容';

            // 處理圖片列表
            const imagesContainer = document.getElementById('modalImages');
            imagesContainer.innerHTML = '';
            if (idea['圖片連結']) {
                const urls = idea['圖片連結'].split('\n');
                urls.forEach(url => {
                    if (url.trim()) {
                        imagesContainer.innerHTML += `<img src="${url.trim()}" class="w-full rounded-xl border border-gray-100 shadow-sm mb-2">`;
                    }
                });
            }

            // 處理連結
            const linkEl = document.getElementById('modalLink');
            if (idea['來源連結']) {
                linkEl.href = idea['來源連結'];
                linkEl.classList.remove('hidden');
            } else {
                linkEl.classList.add('hidden');
            }

            // 設定編輯按鈕的動作
            document.getElementById('modalEditBtn').onclick = () => triggerEdit(index);

            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // 點擊背景關閉
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
    </script>
</body>
</html>
