<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈感收集器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏捲軸但保持可捲動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 文字截斷 (預覽用) */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <!-- ⚠️ 請將這裡替換成您最新部署的 Google Apps Script Web App URL -->
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyiFZ3PEe7yqCXmqVJ_nj9oE_NJhocPBrMpcEBy_wLqXYMOarVcsnmtpNtrBCN6yBuBVA/exec"; 
    </script>

    <!-- 頂部導覽列 -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                💡 靈感收集器
            </h1>
            <nav class="flex gap-2">
                <button onclick="switchTab('add')" id="nav-add" class="px-3 py-2 rounded-md font-medium bg-blue-100 text-blue-700 transition-colors">新增</button>
                <button onclick="switchTab('library')" id="nav-library" class="px-3 py-2 rounded-md font-medium text-gray-600 hover:bg-gray-100 transition-colors">靈感庫</button>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">
        
        <!-- ==================== 分頁 1: 新增靈感 ==================== -->
        <section id="tab-add" class="block space-y-5">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">新增一筆靈感</h2>
                
                <!-- 分類選擇與新增 -->
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">分類</label>
                    <div class="flex gap-2">
                        <select id="category-select" class="flex-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                            <option value="未分類">未分類</option>
                        </select>
                        <button onclick="addNewCategory()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors text-sm font-bold">
                            + 新分類
                        </button>
                    </div>
                </div>

                <!-- 內容輸入 -->
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">靈感內容</label>
                    <textarea id="content-input" rows="5" placeholder="寫下您的想法、筆記或文案..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 resize-y"></textarea>
                </div>

                <!-- 來源連結 -->
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">參考連結 (選填)</label>
                    <input type="url" id="url-input" placeholder="https://..." class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                </div>

                <!-- 圖片上傳 -->
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">附加圖片</label>
                    <label for="image-upload" class="inline-flex items-center justify-center px-4 py-2 border-2 border-dashed border-blue-400 text-blue-600 bg-blue-50 rounded-lg cursor-pointer hover:bg-blue-100 transition-colors w-full sm:w-auto font-medium">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        點擊選擇圖片上傳
                    </label>
                    <input type="file" id="image-upload" multiple accept="image/*" class="hidden" onchange="previewImages(event)">
                    
                    <!-- 圖片預覽區 -->
                    <div id="image-preview-container" class="mt-3 grid grid-cols-2 sm:grid-cols-3 gap-3 empty:hidden"></div>
                </div>

                <!-- 提交大按鈕 -->
                <button onclick="submitIdea()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:bg-blue-700 active:transform active:scale-95 transition-all text-lg">
                    💾 儲存靈感
                </button>
            </div>
        </section>

        <!-- ==================== 分頁 2: 靈感庫 (預覽動態牆) ==================== -->
        <section id="tab-library" class="hidden space-y-6">
            <!-- 篩選列 -->
            <div class="flex gap-2 overflow-x-auto py-2 no-scrollbar" id="filter-container">
                <button class="px-4 py-1.5 rounded-full bg-gray-800 text-white text-sm font-medium whitespace-nowrap filter-btn" data-cat="all" onclick="filterIdeas('all')">全部</button>
            </div>

            <!-- 靈感列表 -->
            <div id="ideas-list" class="flex flex-col gap-5">
                <div class="text-center text-gray-500 py-10">載入中，請稍候...</div>
            </div>
        </section>

    </main>

    <!-- ==================== 瀏覽完整內容 Modal (新加入) ==================== -->
    <div id="view-modal" class="fixed inset-0 bg-black/70 hidden z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] rounded-xl shadow-2xl flex flex-col transform transition-all">
            <!-- 頂部資訊與關閉按鈕 -->
            <div class="p-4 border-b flex justify-between items-center bg-white rounded-t-xl z-10 shrink-0">
                <div class="flex items-center gap-3">
                    <span id="view-category" class="px-2.5 py-1 bg-gray-100 text-gray-700 text-sm font-bold rounded-md"></span>
                    <span id="view-time" class="text-sm text-gray-400"></span>
                </div>
                <button onclick="closeViewModal()" class="text-gray-400 hover:text-gray-800 p-1 bg-gray-100 hover:bg-gray-200 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- 可捲動的內容區 -->
            <div class="p-5 overflow-y-auto no-scrollbar grow">
                <p id="view-text" class="text-gray-800 text-base leading-relaxed whitespace-pre-wrap break-words mb-4"></p>
                <div id="view-images" class="flex flex-col gap-4"></div>
                <div id="view-link-container" class="mt-5 empty:hidden"></div>
            </div>

            <!-- 底部操作列 -->
            <div class="p-4 border-t bg-gray-50 rounded-b-xl flex justify-end gap-3 shrink-0">
                <button onclick="closeViewModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-medium">關閉</button>
                <button id="view-edit-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold flex items-center gap-1">
                    ✏️ 編輯
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 編輯 Modal 彈窗 ==================== -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 hidden z-[60] flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl p-5 transform transition-all max-h-[90vh] flex flex-col">
            <h3 class="text-lg font-bold mb-4 border-b pb-2 shrink-0">編輯靈感</h3>
            <input type="hidden" id="edit-id"> 
            
            <div class="space-y-4 overflow-y-auto no-scrollbar grow py-1">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">分類</label>
                    <select id="edit-category" class="w-full p-2 border rounded-lg bg-gray-50"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">內容</label>
                    <textarea id="edit-content" rows="6" class="w-full p-2 border rounded-lg bg-gray-50 resize-y"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">連結</label>
                    <input type="url" id="edit-url" class="w-full p-2 border rounded-lg bg-gray-50">
                </div>
            </div>

            <div class="mt-4 pt-4 border-t flex justify-end gap-3 shrink-0">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-medium">取消</button>
                <button onclick="submitEdit()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold">儲存修改</button>
            </div>
        </div>
    </div>

    <!-- 全域載入中遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 z-[100] hidden flex-col justify-center items-center backdrop-blur-sm">
        <div class="loader mb-4"></div>
        <p id="loading-text" class="text-blue-600 font-bold text-lg">處理中，請稍候...</p>
    </div>

    <script>
        let allIdeas = [];
        let allCategories = [];
        let uploadedImagesBase64 = []; 

        window.onload = () => {
            if(GAS_URL === "YOUR_GAS_WEB_APP_URL" || GAS_URL === "") {
                alert("請先在 HTML 原始碼中填寫您的 GAS Web App URL！");
                return;
            }
            fetchData();
        };

        function switchTab(tab) {
            document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
            document.getElementById('tab-library').style.display = tab === 'library' ? 'block' : 'none';
            
            document.getElementById('nav-add').className = tab === 'add' ? 'px-3 py-2 rounded-md font-medium bg-blue-100 text-blue-700 transition-colors' : 'px-3 py-2 rounded-md font-medium text-gray-600 hover:bg-gray-100 transition-colors';
            document.getElementById('nav-library').className = tab === 'library' ? 'px-3 py-2 rounded-md font-medium bg-blue-100 text-blue-700 transition-colors' : 'px-3 py-2 rounded-md font-medium text-gray-600 hover:bg-gray-100 transition-colors';
        }

        function showLoading(text = "載入中...") {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function getDirectImageUrl(driveUrl) {
            if (!driveUrl) return '';
            const match = driveUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            return driveUrl;
        }

        async function fetchData() {
            showLoading("同步資料庫中...");
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                allIdeas = data.ideas || [];
                allCategories = data.categories || [];
                
                updateCategoryUI();
                renderLibrary('all');
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("讀取失敗，請確認 GAS 網址與權限設定是否正確。");
            } finally {
                hideLoading();
            }
        }

        function updateCategoryUI() {
            const selectAdd = document.getElementById('category-select');
            const selectEdit = document.getElementById('edit-category');
            let optionsHTML = '';
            allCategories.forEach(cat => {
                optionsHTML += `<option value="${cat}">${cat}</option>`;
            });
            selectAdd.innerHTML = optionsHTML || '<option value="未分類">未分類</option>';
            selectEdit.innerHTML = optionsHTML || '<option value="未分類">未分類</option>';

            const filterContainer = document.getElementById('filter-container');
            let filtersHTML = `<button class="px-4 py-1.5 rounded-full bg-gray-800 text-white text-sm font-medium whitespace-nowrap filter-btn" data-cat="all" onclick="filterIdeas('all')">全部</button>`;
            allCategories.forEach(cat => {
                filtersHTML += `<button class="px-4 py-1.5 rounded-full bg-white border border-gray-300 text-gray-700 text-sm font-medium whitespace-nowrap hover:bg-gray-100 filter-btn" data-cat="${cat}" onclick="filterIdeas('${cat}')">${cat}</button>`;
            });
            filterContainer.innerHTML = filtersHTML;
        }

        // 優化後的預覽圖片功能
        function previewImages(event) {
            const files = event.target.files;
            const container = document.getElementById('image-preview-container');
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    uploadedImagesBase64.push(base64String);
                    const currentIndex = uploadedImagesBase64.length - 1;
                    
                    const imgDiv = document.createElement('div');
                    imgDiv.className = "relative aspect-square rounded-lg overflow-hidden border border-gray-200 shadow-sm group";
                    // 加大紅色刪除按鈕，Hover 時稍微放大
                    imgDiv.innerHTML = `
                        <img src="${base64String}" class="w-full h-full object-cover">
                        <button type="button" class="absolute top-1.5 right-1.5 bg-red-500 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold shadow-md hover:bg-red-600 hover:scale-110 transition-transform" onclick="removeImage(this, ${currentIndex})">✕</button>
                    `;
                    container.appendChild(imgDiv);
                };
                reader.readAsDataURL(file);
            }
            // 每次選完後清空 input 的值，這樣即使刪除圖片後選「同一張」也能順利觸發上傳
            event.target.value = '';
        }

        function removeImage(btnElement, index) {
            uploadedImagesBase64[index] = null; 
            btnElement.parentElement.remove();
        }

        async function submitIdea() {
            const category = document.getElementById('category-select').value;
            const content = document.getElementById('content-input').value;
            const url = document.getElementById('url-input').value;
            
            const finalImages = uploadedImagesBase64.filter(img => img !== null);

            if (!content && finalImages.length === 0 && !url) {
                alert("請至少輸入內容、連結或上傳圖片喔！");
                return;
            }

            showLoading("正在儲存並上傳圖片...");

            const payload = {
                action: 'addIdea',
                category: category,
                content: content,
                url: url,
                images: finalImages
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    document.getElementById('content-input').value = '';
                    document.getElementById('url-input').value = '';
                    document.getElementById('image-upload').value = '';
                    document.getElementById('image-preview-container').innerHTML = '';
                    uploadedImagesBase64 = [];
                    
                    await fetchData();
                    switchTab('library');
                } else {
                    alert("儲存失敗：" + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("連線發生錯誤！");
            } finally {
                hideLoading();
            }
        }

        // ==================== 渲染動態牆 (預覽模式) ====================
        function renderLibrary(filterCat) {
            const listContainer = document.getElementById('ideas-list');
            listContainer.innerHTML = ''; 

            const filteredIdeas = filterCat === 'all' 
                ? allIdeas 
                : allIdeas.filter(idea => idea['分類'] === filterCat);

            if (filteredIdeas.length === 0) {
                listContainer.innerHTML = '<div class="text-center text-gray-400 py-10">這個分類目前沒有靈感喔！</div>';
                return;
            }

            filteredIdeas.forEach(idea => {
                // 解析圖片：預覽牆只顯示「第一張圖」的縮圖
                let imagePreviewHtml = '';
                if (idea['圖片連結']) {
                    const urls = idea['圖片連結'].toString().split('\n').filter(u => u.trim() !== '');
                    if (urls.length > 0) {
                        const directUrl = getDirectImageUrl(urls[0].trim());
                        const extraCount = urls.length - 1; // 看看還有沒有其他圖片
                        
                        imagePreviewHtml = `
                            <div class="relative w-full h-40 mt-2 rounded-lg overflow-hidden border border-gray-100">
                                <img src="${directUrl}" loading="lazy" class="w-full h-full object-cover" alt="靈感圖片">
                                <!-- 如果有多張圖片，顯示 +N 提示 -->
                                ${extraCount > 0 ? `<div class="absolute inset-0 bg-black/40 flex justify-center items-center text-white font-bold text-xl backdrop-blur-sm">+${extraCount}</div>` : ''}
                            </div>
                        `;
                    }
                }

                // 建立卡片 (加入 hover 效果與游標指標)
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col gap-2 cursor-pointer hover:shadow-md hover:border-blue-300 transition-all";
                card.onclick = () => openViewModal(idea['時間_ID']); // 點擊卡片開啟完整檢視

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="inline-block px-2.5 py-1 bg-gray-100 text-gray-700 text-xs font-bold rounded-md">${idea['分類']}</span>
                        <span class="text-xs text-gray-400">${idea['時間_顯示'] || ''}</span>
                    </div>
                    
                    <!-- 截斷的文字內容 (最多 3 行) -->
                    <p class="text-gray-800 text-base leading-relaxed line-clamp-3">${escapeHTML(idea['內容描述'] || '')}</p>
                    
                    <!-- 圖片縮圖預覽 -->
                    ${imagePreviewHtml}
                    
                    <!-- 底部提示文字 & 編輯按鈕 -->
                    <div class="flex justify-between items-center mt-2 pt-3 border-t border-gray-50">
                        <span class="text-xs text-gray-400">點擊查看完整內容</span>
                        <button onclick="event.stopPropagation(); openEditModal(${idea['時間_ID']})" class="text-sm text-gray-500 hover:text-blue-600 font-medium px-2 py-1 flex items-center gap-1 transition-colors bg-gray-50 hover:bg-blue-50 rounded-md">
                            ✏️ 編輯
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function filterIdeas(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.cat === cat) {
                    btn.classList.replace('bg-white', 'bg-gray-800');
                    btn.classList.replace('text-gray-700', 'text-white');
                    btn.classList.replace('border', 'border-transparent');
                } else {
                    btn.classList.replace('bg-gray-800', 'bg-white');
                    btn.classList.replace('text-white', 'text-gray-700');
                    btn.classList.add('border');
                }
            });
            renderLibrary(cat);
        }

        async function addNewCategory() {
            const newCat = prompt("請輸入新的分類名稱：");
            if (!newCat || newCat.trim() === '') return;
            if (allCategories.includes(newCat.trim())) {
                alert("此分類已經存在囉！");
                return;
            }

            showLoading("新增分類中...");
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addCategory', category: newCat.trim() })
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    await fetchData(); 
                }
            } catch (error) {
                alert("新增分類失敗！");
            } finally {
                hideLoading();
            }
        }

        // ==================== 檢視完整內容 (View Modal) ====================
        function openViewModal(rowId) {
            const idea = allIdeas.find(i => i['時間_ID'] == rowId);
            if(!idea) return;

            document.getElementById('view-category').innerText = idea['分類'];
            document.getElementById('view-time').innerText = idea['時間_顯示'] || '';
            document.getElementById('view-text').innerHTML = escapeHTML(idea['內容描述'] || '');

            // 處理所有圖片的大圖顯示
            const imagesContainer = document.getElementById('view-images');
            imagesContainer.innerHTML = '';
            if (idea['圖片連結']) {
                const urls = idea['圖片連結'].toString().split('\n').filter(u => u.trim() !== '');
                urls.forEach(url => {
                    const directUrl = getDirectImageUrl(url.trim());
                    imagesContainer.innerHTML += `<img src="${directUrl}" loading="lazy" class="w-full h-auto rounded-lg border border-gray-200 shadow-sm">`;
                });
            }

            // 處理外部連結
            const linkContainer = document.getElementById('view-link-container');
            linkContainer.innerHTML = '';
            if (idea['來源連結']) {
                linkContainer.innerHTML = `
                    <a href="${idea['來源連結']}" target="_blank" class="inline-flex justify-center items-center text-base font-bold text-blue-600 bg-blue-50 border border-blue-100 px-4 py-3 rounded-xl hover:bg-blue-100 transition-colors w-full">
                        🔗 點擊前往參考連結
                    </a>
                `;
            }

            // 設定在 View Modal 內的編輯按鈕行為
            const editBtn = document.getElementById('view-edit-btn');
            editBtn.onclick = () => {
                closeViewModal(); // 先關閉檢視視窗
                openEditModal(rowId); // 再開啟編輯視窗
            };

            document.body.classList.add('overflow-hidden'); // 鎖定背景捲動
            document.getElementById('view-modal').classList.remove('hidden');
        }

        function closeViewModal() {
            document.body.classList.remove('overflow-hidden'); // 恢復背景捲動
            document.getElementById('view-modal').classList.add('hidden');
        }

        // ==================== 編輯功能 (Edit Modal) ====================
        function openEditModal(rowId) {
            const idea = allIdeas.find(i => i['時間_ID'] == rowId);
            if(!idea) return;

            document.getElementById('edit-id').value = rowId;
            document.getElementById('edit-category').value = idea['分類'];
            document.getElementById('edit-content').value = idea['內容描述'] || '';
            document.getElementById('edit-url').value = idea['來源連結'] || '';
            
            document.body.classList.add('overflow-hidden'); // 鎖定背景捲動
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.body.classList.remove('overflow-hidden'); // 恢復背景捲動
            document.getElementById('edit-modal').classList.add('hidden');
        }

        async function submitEdit() {
            const rowId = document.getElementById('edit-id').value;
            const category = document.getElementById('edit-category').value;
            const content = document.getElementById('edit-content').value;
            const url = document.getElementById('edit-url').value;

            showLoading("更新資料中...");
            closeEditModal();

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateIdea',
                        id: rowId,
                        category: category,
                        content: content,
                        url: url
                    })
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    await fetchData(); 
                } else {
                    alert("更新失敗：" + result.message);
                }
            } catch (error) {
                alert("連線發生錯誤！");
            } finally {
                hideLoading();
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

    </script>
</body>
</html>
