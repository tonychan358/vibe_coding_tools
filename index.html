<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="IdeaApp">
    <link rel="apple-touch-icon"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Google_Keep_icon_%282020%29.svg/512px-Google_Keep_icon_%282020%29.svg.png">

    <title>靈感收集器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="text-gray-800 antialiased font-sans">

    <script>
        // 配置你的 Google Apps Script Web App URL
        window.GAS_URL = "https://script.google.com/macros/s/AKfycbwE8hctuwOfnW47CGu28rHNWXx-TUZv5NziHysSWraP7u4Bcoorp41Kss7l0XvHySTnIQ/exec"; 
    </script>

    <div class="app-container">
        <!-- Header -->
        <header class="px-6 py-4 z-10 flex justify-between items-center shrink-0 shadow-sm">
            <h1 id="headerTitle"
                class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-gray-50 flex items-center gap-2">
                新增靈感</h1>
            <div class="flex items-center gap-2">
                <button id="refreshBtn"
                    class="hidden text-gray-400 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors p-2"
                    onclick="fetchData()">
                    <i class="ph ph-arrows-clockwise text-2xl"></i>
                </button>
                <i id="headerIcon" class="ph ph-sparkle text-2xl text-blue-500 dark:text-blue-400"></i>
            </div>
        </header>

        <main id="mainContent" class="no-scrollbar">
            <!-- View 1: Add -->
            <section id="view-add" class="view-section active px-5 py-6 space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">分類</label>
                    <div class="relative shadow-sm rounded-xl">
                        <select id="add-category"
                            class="w-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-gray-100 rounded-xl px-4 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-base font-medium">
                            <option value="未分類">未分類</option>
                        </select>
                        <i
                            class="ph ph-caret-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">靈感內容</label>
                    <textarea id="add-content" rows="4" placeholder="寫下筆記或貼上文案..."
                        class="w-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base resize-none shadow-sm"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">來源連結 (選填)</label>
                    <div class="relative shadow-sm rounded-xl">
                        <i
                            class="ph ph-link absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input type="url" id="add-url" placeholder="貼上網址..."
                            class="w-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-gray-100 rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">附加截圖 (選填)</label>
                    <input type="file" id="image-upload" accept="image/*" multiple class="hidden">
                    <button type="button" onclick="document.getElementById('image-upload').click()"
                        class="w-full border-2 border-dashed border-blue-300 dark:border-blue-900 bg-blue-50/50 dark:bg-blue-900/10 rounded-xl py-5 flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/20 transition-all cursor-pointer">
                        <i class="ph ph-image text-3xl mb-1"></i>
                        <span class="text-sm font-bold">上傳圖片</span>
                    </button>
                    <div id="add-preview-container" class="preview-scroll mt-3 hidden"></div>
                    <button id="ai-btn" type="button" onclick="aiSummarize()"
                        class="w-full mt-3 bg-purple-100 dark:bg-purple-900/20 text-purple-700 dark:text-purple-400 border border-purple-200 dark:border-purple-800 rounded-xl py-3 flex items-center justify-center gap-2 font-bold hover:bg-purple-200 dark:hover:bg-purple-900/30 transition-all active:scale-95 shadow-sm">
                        <i class="ph ph-magic-wand text-lg"></i>
                        <span>✨ AI 智慧提取</span>
                    </button>
                </div>

                <button id="submit-btn" onclick="submitIdea()"
                    class="w-full bg-blue-600 text-white font-bold rounded-xl py-4 mt-2 flex items-center justify-center gap-2 active:scale-95 transition-all shadow-md hover:bg-blue-700 text-lg">
                    <i class="ph ph-paper-plane-right text-xl"></i>
                    <span>儲存靈感</span>
                </button>
            </section>

            <!-- View 2: Library -->
            <section id="view-library" class="view-section relative bg-gray-50/50 dark:bg-black min-h-full">
                <div class="category-tabs no-scrollbar dark:bg-gray-900/80 dark:border-gray-800" id="library-tabs">
                    <button class="tab-btn active" onclick="filterLibrary('all')">全部</button>
                </div>
                <div id="library-container" class="p-4 space-y-4">
                    <div class="text-center py-20 text-gray-400 flex flex-col items-center">
                        <div class="loader mb-4"></div>
                        <p>載入中...</p>
                    </div>
                </div>
            </section>

            <!-- View 3: Search -->
            <section id="view-search" class="view-section px-4 py-4 bg-gray-50 dark:bg-gray-950 min-h-full">
                <div class="relative mb-4 sticky top-4 z-10">
                    <i
                        class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl"></i>
                    <input type="text" id="search-input" placeholder="搜尋內容..."
                        class="w-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-gray-100 rounded-2xl pl-11 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm text-base">
                </div>
                <div id="search-container" class="space-y-4">
                    <div class="text-center py-20 text-gray-400">
                        <p class="font-medium">輸入關鍵字開始尋找</p>
                    </div>
                </div>
            </section>

            <!-- View 4: Settings -->
            <section id="view-settings" class="view-section px-5 py-6 space-y-6">
                <div
                    class="bg-white dark:bg-[#151c2c] rounded-2xl p-5 shadow-sm border border-gray-200 dark:border-gray-800">
                    <h3 class="text-base font-bold text-gray-800 dark:text-gray-200 mb-3"><i
                            class="ph ph-folder-plus text-xl mr-2 text-blue-500"></i>分類管理</h3>
                    <div class="flex space-x-2">
                        <input type="text" id="new-category-input" placeholder="新增分類..."
                            class="flex-1 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-gray-100 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <button onclick="addNewCategory()"
                            class="bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 px-4 py-2.5 rounded-xl font-bold text-sm">新增</button>
                    </div>
                </div>

                <div
                    class="bg-white dark:bg-[#151c2c] rounded-2xl p-5 shadow-sm border border-gray-200 dark:border-gray-800">
                    <h3 class="text-base font-bold text-gray-800 dark:text-gray-200 mb-3"><i
                            class="ph ph-key text-xl mr-2 text-purple-500"></i>Gemini API Key</h3>
                    <input type="password" id="api-key-input" placeholder="API Key..."
                        class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-gray-100 rounded-xl px-4 py-3 text-sm mb-3">
                    <button onclick="saveSettings()"
                        class="w-full bg-gray-900 dark:bg-blue-600 text-white font-bold rounded-xl py-3 flex items-center justify-center gap-2 shadow-md">儲存設定</button>
                </div>

                <div
                    class="bg-white dark:bg-[#151c2c] rounded-2xl p-5 shadow-sm border border-gray-200 dark:border-gray-800">
                    <h3 class="text-base font-bold text-gray-800 dark:text-gray-200 mb-4 flex items-center"><i
                            class="ph ph-palette text-xl mr-2 text-indigo-500"></i>顯示與介面</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">深色模式</span>
                        <button onclick="toggleDarkMode()"
                            class="w-12 h-6 bg-gray-200 dark:bg-blue-600 rounded-full relative transition-colors">
                            <div class="absolute w-4 h-4 bg-white rounded-full top-1 left-1 dark:left-7 transition-all">
                            </div>
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="flex justify-around items-center pt-2 px-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="nav-item active flex flex-col items-center p-2 text-gray-400 cursor-pointer transition-all"
                onclick="switchView('add', this)">
                <i class="ph ph-plus-circle text-2xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Add</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2 text-gray-400 cursor-pointer transition-all"
                onclick="switchView('library', this)">
                <i class="ph ph-cards text-2xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Flow</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2 text-gray-400 cursor-pointer transition-all"
                onclick="switchView('search', this)">
                <i class="ph ph-magnifying-glass text-2xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Search</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2 text-gray-400 cursor-pointer transition-all"
                onclick="switchView('settings', this)">
                <i class="ph ph-gear text-2xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Setup</span>
            </div>
        </nav>

        <!-- Modals -->
        <div id="view-modal"
            class="absolute inset-0 bg-black/70 hidden z-50 flex justify-center items-end sm:items-center p-0 sm:p-4 backdrop-blur-sm transition-opacity">
            <div
                class="bg-white dark:bg-gray-900 w-full h-[90vh] sm:h-auto sm:max-h-[85vh] rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col border-t dark:border-gray-800">
                <div
                    class="p-4 border-b dark:border-gray-800 flex justify-between items-center bg-white dark:bg-gray-900 rounded-t-2xl shrink-0">
                    <div class="flex items-center gap-3">
                        <span id="view-category"
                            class="px-2.5 py-1 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-bold rounded-md"></span>
                        <span id="view-time" class="text-xs text-gray-400 dark:text-gray-500 font-medium"></span>
                    </div>
                    <button onclick="closeViewModal()"
                        class="text-gray-400 hover:text-gray-800 p-1.5 bg-gray-100 dark:bg-gray-800 rounded-full"><i
                            class="ph ph-x text-lg"></i></button>
                </div>
                <div class="p-5 overflow-y-auto grow bg-gray-50 dark:bg-gray-950 no-scrollbar">
                    <p id="view-text"
                        class="text-gray-800 dark:text-gray-200 text-[15px] leading-relaxed whitespace-pre-wrap break-words mb-5">
                    </p>
                    <div id="view-images" class="flex flex-col gap-3"></div>
                    <div id="view-link-container" class="mt-5 empty:hidden"></div>
                </div>
                <div
                    class="p-4 border-t dark:border-gray-800 bg-white dark:bg-gray-900 flex justify-between gap-3 shrink-0 pb-safe">
                    <button id="view-delete-btn"
                        class="px-4 py-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-xl font-bold flex items-center gap-1"><i
                            class="ph ph-trash"></i> 刪除</button>
                    <button id="view-edit-btn"
                        class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold flex items-center gap-1 shadow-sm"><i
                            class="ph ph-pencil-simple"></i> 編輯</button>
                </div>
            </div>
        </div>

        <div id="edit-modal"
            class="absolute inset-0 bg-white dark:bg-gray-950 hidden z-[60] flex-col transition-transform">
            <div
                class="px-4 py-3 border-b dark:border-gray-800 flex justify-between items-center bg-white dark:bg-gray-900 shrink-0 shadow-sm">
                <button onclick="closeEditModal()" class="text-gray-500 font-bold px-2 py-1">取消</button>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">編輯靈感</h3>
                <button onclick="submitEdit()" class="text-blue-600 font-bold px-2 py-1">儲存</button>
            </div>
            <div class="p-5 overflow-y-auto grow space-y-5 bg-gray-50 dark:bg-gray-950 no-scrollbar">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">分類</label>
                    <select id="edit-category"
                        class="w-full p-3 border border-gray-200 dark:border-gray-800 rounded-xl bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">內容</label>
                    <textarea id="edit-content" rows="6"
                        class="w-full p-3 border border-gray-200 dark:border-gray-800 rounded-xl bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">連結</label>
                    <input type="url" id="edit-url"
                        class="w-full p-3 border border-gray-200 dark:border-gray-800 rounded-xl bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <div id="loading-overlay"
            class="absolute inset-0 bg-white/80 dark:bg-black/80 z-[100] hidden flex-col justify-center items-center backdrop-blur-sm">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-blue-600 dark:text-blue-400 font-bold text-lg">處理中...</p>
        </div>
        <div id="toast-msg"
            class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-lg font-bold text-sm hidden z-[110] transition-opacity opacity-0 whitespace-nowrap">
            訊息</div>
    </div>

    <script type="module">
        import { init } from './js/app.js';
        init();
    </script>
</body>

</html>
